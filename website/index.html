<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F26522" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Taqon Electrico" />
    <link rel="apple-touch-icon" href="/fav.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Preconnect to Google Fonts (eliminates DNS+TLS round trips ~100-300ms) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the font CSS so it loads in parallel with JS instead of blocking via @import -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" />
    <title>Taqon Electrico — Zimbabwe's Premier Solar & Electrical Company</title>
    <meta name="description" content="Taqon Electrico provides professional solar installations, electrical maintenance, and renewable energy solutions in Harare, Zimbabwe. ZERA recommended solar company." />
    <!-- iOS safety net: if Tailwind's modern CSS fails on older iOS Safari,
         these inline rules keep the page readable (cream bg, dark text). -->
    <style>
      html, body { background-color: #FFFBF5; color: #1A1A1A; margin: 0; }
      #root { min-height: 100vh; background-color: #FFFBF5; }
      #root:empty::before {
        content: "Loading…";
        display: block;
        padding: 2rem;
        font-family: system-ui, -apple-system, sans-serif;
        color: #1A1A1A;
        text-align: center;
      }
    </style>
    <!-- Analytics: Uncomment to activate Plausible -->
    <!-- <script defer data-domain="taqon.co.zw" src="https://plausible.io/js/script.js"></script> -->
    <!-- Diagnostic: surface JS errors on-page for users who can't open devtools.
         Remove once the iPhone rendering issue is resolved. -->
    <script>
      (function () {
        function show(msg) {
          var el = document.getElementById('__diag__') || (function () {
            var d = document.createElement('div');
            d.id = '__diag__';
            d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#F26522;color:#fff;padding:12px;font:12px/1.4 system-ui,-apple-system,sans-serif;z-index:999999;white-space:pre-wrap;max-height:60vh;overflow:auto';
            document.body && document.body.appendChild(d);
            return d;
          })();
          el.textContent += msg + '\n\n';
        }
        window.addEventListener('error', function (e) {
          show('[error] ' + (e.message || '') + '\nat ' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show('[promise] ' + (e.reason && (e.reason.stack || e.reason.message || e.reason) || 'unknown'));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="//code.tidio.co/ahsai9b3llw7yewkmi7fvnlkzimgpzaf.js" async></script>
  </body>
</html>
